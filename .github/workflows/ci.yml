name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.0
      - name: helm dependency update
        run: helm dependency update .
      - name: helm lint
        run: helm lint .
      - name: helm template
        run: helm template authn-ci . -f ci/test-values.yaml > /tmp/manifests.yaml
      - name: kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz \
            | tar -xz -C /tmp kubeconform
          /tmp/kubeconform -strict -ignore-missing-schemas -summary /tmp/manifests.yaml

  install:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.0
      - name: helm dependency update
        run: helm dependency update .
      - uses: helm/kind-action@v1
        with:
          cluster_name: authn-ci
      - name: helm install
        run: |
          helm install authn-ci . \
            --namespace authn --create-namespace \
            -f ci/test-values.yaml \
            --wait --timeout 5m
      - name: helm test
        run: helm test authn-ci --namespace authn --logs --timeout 2m
      - name: Diagnose on failure
        if: failure()
        run: |
          kubectl -n authn get all
          kubectl -n authn describe pods
          kubectl -n authn logs -l app.kubernetes.io/instance=authn-ci --all-containers --tail=200 || true
