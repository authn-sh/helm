name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: v3.20.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: helm dependency update
        run: helm dependency update .

      - name: helm package
        run: helm package . -d dist

      - name: Push to GHCR (OCI)
        run: |
          for chart in dist/*.tgz; do
            helm push "$chart" oci://ghcr.io/authn-sh/charts
          done

      - name: Configure git for gh-pages
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Update gh-pages index
        run: |
          set -eu
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add /tmp/pages gh-pages
          else
            git worktree add --detach /tmp/pages
            cd /tmp/pages
            git checkout --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd "$GITHUB_WORKSPACE"
          fi
          cp dist/*.tgz /tmp/pages/
          cd /tmp/pages
          if [ -f index.yaml ]; then
            helm repo index . --url "https://authn-sh.github.io/helm" --merge index.yaml
          else
            helm repo index . --url "https://authn-sh.github.io/helm"
          fi
          git add -A
          git commit -m "release: ${{ github.ref_name }}" || echo "nothing to commit"
          git push origin gh-pages
