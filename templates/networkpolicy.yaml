{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "authn.fullname" . }}-web
  labels:
    {{- include "authn.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  podSelector:
    matchLabels:
      {{- include "authn.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes: [Ingress, Egress]
  ingress:
    - from: []
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: {{ .Values.env.MAIL_PORT | default "587" }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "authn.fullname" . }}-worker
  labels:
    {{- include "authn.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  podSelector:
    matchLabels:
      {{- include "authn.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: worker
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/instance: {{ .Release.Name }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to: []
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: {{ .Values.env.MAIL_PORT | default "587" }}
{{- end }}
