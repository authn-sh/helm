apiVersion: v1
kind: Service
metadata:
  name: {{ include "authn.fullname" . }}
  labels: {{- include "authn.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    {{- include "authn.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
