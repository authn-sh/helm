apiVersion: v1
kind: Pod
metadata:
  name: {{ include "authn.fullname" . }}-test-connection
  labels: {{- include "authn.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.10.1
      command: [/bin/sh, -c]
      args:
        - |
          set -eu
          for i in $(seq 1 30); do
            if curl -sf "http://{{ include "authn.fullname" . }}:{{ .Values.service.port }}{{ .Values.probes.readiness.path }}"; then
              echo " ok"
              exit 0
            fi
            sleep 2
          done
          echo "service never became ready"
          exit 1
