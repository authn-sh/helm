apiVersion: v2
name: authn
description: Self-hosted authentication-as-a-service. Account Portal, Dashboard, FAPI, BAPI, and webhooks in one chart.
type: application
version: 0.6.0
appVersion: "0.6.0"
home: https://authn.sh
sources:
  - https://github.com/authn-sh/authn
  - https://github.com/authn-sh/helm
keywords:
  - authn
  - authentication
  - identity
  - sso
  - jwt
maintainers:
  - name: authn.sh
    url: https://authn.sh
icon: https://authn.sh/icon.png
dependencies:
  - name: postgresql
    version: 16.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 20.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
